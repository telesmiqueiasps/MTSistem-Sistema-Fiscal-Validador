<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MT Sistem - Validador</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>MT Sistem - Validador</h1>
    <p>Painel de acompanhamento de clientes e versões do sistema fiscal</p>
  </header>

  <main>
    <section id="info-versao" class="info-versao">
      <p class="info-msg">Carregando informações da versão...</p>
    </section>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID Cliente</th>
            <th>Status</th>
            <th>Versão Atual</th>
            <th>Download</th>
            <th>Mensagem</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela">
          <tr>
            <td colspan="5" class="info-msg">Carregando clientes...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
