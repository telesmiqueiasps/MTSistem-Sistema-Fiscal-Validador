<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MT Sistem - Validador</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-overlay" class="auth-overlay">
    <form id="auth-form" class="auth-box">
      <img src="logo.png" alt="MT Sistem" class="auth-logo" />
      <h2>Acesso restrito</h2>
      <input type="password" id="auth-senha" placeholder="Senha" autocomplete="current-password" required />
      <button type="submit">Entrar</button>
      <p id="auth-erro" class="auth-erro" hidden>Senha incorreta.</p>
    </form>
  </div>

  <div id="conteudo-principal" class="oculto">
    <header class="header-principal">
      <img src="logo.png" alt="MT Sistem" class="header-logo" />
      <div>
        <h1>MT Sistem - Validador</h1>
        <p>Painel de acompanhamento de clientes e versões do sistema fiscal</p>
      </div>
    </header>

    <main>
      <section id="info-versao" class="info-versao">
        <p class="info-msg">Carregando informações da versão...</p>
      </section>

      <div class="busca-wrapper">
        <input type="text" id="busca-cliente" placeholder="Pesquisar por ID do cliente..." />
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID Cliente</th>
              <th>Status</th>
              <th>Versão Atual</th>
              <th>Download</th>
              <th>Mensagem</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela">
            <tr>
              <td colspan="5" class="info-msg">Carregando clientes...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
